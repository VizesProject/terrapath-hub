name: Publish approved guide

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'guide-submission')
    concurrency:
      group: publish-guide-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure publication labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              ["approved", "5319e7", "Approved by a maintainer and ready for publication"],
              ["published", "0e8a16", "Merged into the public catalog"],
              ["automated-pr", "0e8a16", "Pull request created by moderation workflow"]
            ];
            for (const [name, color, description] of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description
                });
              }
            }

      - name: Export guide from issue
        id: export
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python tools/issue_submission.py export-issue

      - name: Validate guides
        run: python tools/validate_guides.py

      - name: Rebuild catalog
        run: python tools/build_catalog.py

      - name: Create publication branch
        id: branch
        run: |
          set -euo pipefail
          BRANCH_NAME="publish/issue-${{ github.event.issue.number }}"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [ -z "$(git status --porcelain)" ]; then
            echo "branch_pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add -A

          if git diff --cached --quiet; then
            echo "branch_pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Publish guide from issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME" --force
          echo "branch_pushed=true" >> "$GITHUB_OUTPUT"

      - name: Create publication pull request
        id: cpr
        if: steps.branch.outputs.branch_pushed == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
          GUIDE_ID: ${{ steps.export.outputs.guide_id }}
          GUIDE_PATH: ${{ steps.export.outputs.guide_path }}
        with:
          github-token: ${{ secrets.BOT_PAT != '' && secrets.BOT_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchName = process.env.BRANCH_NAME;
            const base = context.payload.repository?.default_branch || "main";

            const title = `Publish guide: ${process.env.GUIDE_ID}`;
            const body = [
              `Closes #${context.issue.number}`,
              "",
              "This pull request was created automatically by the TerraPath moderation workflow.",
              "",
              "Published guide:",
              `- ID: \`${process.env.GUIDE_ID}\``,
              `- Path: \`${process.env.GUIDE_PATH}\``
            ].join("\n");

            let prUrl = "";
            let outcome = "no_changes";

            try {
              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${branchName}`,
                base,
                per_page: 1
              });

              if (existing.data.length > 0) {
                prUrl = existing.data[0].html_url;
                outcome = "created";
              } else {
                const created = await github.rest.pulls.create({
                  owner,
                  repo,
                  title,
                  head: branchName,
                  base,
                  body
                });
                prUrl = created.data.html_url;
                outcome = "created";

                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: created.data.number,
                    labels: ["automated-pr"]
                  });
                } catch (labelError) {
                  core.warning(`Could not add automated-pr label: ${labelError.message}`);
                }
              }
            } catch (error) {
              outcome = "failure";
              core.warning(`Automatic PR creation failed: ${error.message}`);
            }

            core.setOutput("pull-request-url", prUrl);
            core.setOutput("outcome", outcome);

      - name: Comment with pull request link
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name || format('publish/issue-{0}', github.event.issue.number) }}
          CPR_OUTCOME: ${{ steps.cpr.outputs.outcome || 'no_changes' }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const marker = '<!-- terrapath-publication-status -->';
            const branchUrl = `${process.env.SERVER_URL}/${process.env.REPOSITORY}/tree/${process.env.BRANCH_NAME}`;
            const body = process.env.CPR_OUTCOME === 'failure'
              ? [
                  marker,
                  '',
                  'Publication branch was pushed, but GitHub Actions could not create the pull request automatically.',
                  '',
                  `Branch: ${branchUrl}`,
                  '',
                  'Most common fix:',
                  '1. Open `Settings -> Actions -> General` in the repository.',
                  '2. In `Workflow permissions`, enable `Allow GitHub Actions to create and approve pull requests`.',
                  '3. Add repository secret `BOT_PAT` (a token with pull request rights).',
                  '4. Re-run this workflow, or open a pull request manually from the branch above.'
                ].join('\n')
              : process.env.PR_URL
              ? [
                  marker,
                  '',
                  `Publication pull request created: ${process.env.PR_URL}`,
                  '',
                  'Next step:',
                  '1. Review the PR diff.',
                  '2. Merge it into `main`.',
                  '3. GitHub Pages will publish the updated catalog automatically.'
                ].join('\n')
              : [
                  marker,
                  '',
                  'No publication PR was created. This usually means the exported guide did not change the repository.'
                ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const existing = comments.filter((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing.length) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing[0].id,
                body
              });

              for (const duplicate of existing.slice(1)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: duplicate.id
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            }

      - name: Notice if GitHub blocked pull request creation
        if: steps.cpr.outputs.outcome == 'failure'
        run: |
          echo "::warning::Automatic pull request creation failed."
          echo "::warning::Enable 'Allow GitHub Actions to create and approve pull requests' in Settings -> Actions -> General."
          echo "::warning::For org-level restrictions, add BOT_PAT repository secret with pull request rights."
          echo "::warning::If org policy blocks it, open a manual PR from branch publish/issue-${{ github.event.issue.number }}."
