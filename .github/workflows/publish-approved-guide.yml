name: Publish approved guide

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'guide-submission')
    concurrency:
      group: publish-guide-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure publication labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              ["approved", "5319e7", "Approved by a maintainer and ready for publication"],
              ["published", "0e8a16", "Merged into the public catalog"],
              ["automated-pr", "0e8a16", "Pull request created by moderation workflow"]
            ];
            for (const [name, color, description] of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description
                });
              }
            }

      - name: Export guide from issue
        id: export
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python tools/issue_submission.py export-issue

      - name: Validate guides
        run: python tools/validate_guides.py

      - name: Rebuild catalog
        run: python tools/build_catalog.py

      - name: Create publication pull request (GITHUB_TOKEN)
        id: cpr_default
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "Publish guide from issue #${{ github.event.issue.number }}"
          branch: "publish/issue-${{ github.event.issue.number }}"
          delete-branch: true
          title: "Publish guide: ${{ steps.export.outputs.guide_id }}"
          body: |
            Closes #${{ github.event.issue.number }}

            This pull request was created automatically by the TerraPath moderation workflow.

            Published guide:
            - ID: `${{ steps.export.outputs.guide_id }}`
            - Path: `${{ steps.export.outputs.guide_path }}`
          labels: automated-pr
          add-paths: |
            guides/**
            catalog/**

      - name: Create publication pull request (BOT_PAT fallback)
        id: cpr_pat
        if: steps.cpr_default.outcome == 'failure' && secrets.BOT_PAT != ''
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BOT_PAT }}
          commit-message: "Publish guide from issue #${{ github.event.issue.number }}"
          branch: "publish/issue-${{ github.event.issue.number }}"
          delete-branch: true
          title: "Publish guide: ${{ steps.export.outputs.guide_id }}"
          body: |
            Closes #${{ github.event.issue.number }}

            This pull request was created automatically by the TerraPath moderation workflow.

            Published guide:
            - ID: `${{ steps.export.outputs.guide_id }}`
            - Path: `${{ steps.export.outputs.guide_path }}`
          labels: automated-pr
          add-paths: |
            guides/**
            catalog/**

      - name: Resolve publication result
        id: publication
        env:
          DEFAULT_OUTCOME: ${{ steps.cpr_default.outcome }}
          PAT_OUTCOME: ${{ steps.cpr_pat.outcome }}
          DEFAULT_PR_URL: ${{ steps.cpr_default.outputs.pull-request-url }}
          PAT_PR_URL: ${{ steps.cpr_pat.outputs.pull-request-url }}
        run: |
          set -euo pipefail
          PR_URL="$DEFAULT_PR_URL"
          if [ -z "$PR_URL" ]; then
            PR_URL="$PAT_PR_URL"
          fi

          if [ -n "$PR_URL" ]; then
            OUTCOME="created"
          elif [ "$DEFAULT_OUTCOME" = "failure" ] && { [ -z "$PAT_OUTCOME" ] || [ "$PAT_OUTCOME" = "failure" ]; }; then
            OUTCOME="failure"
          else
            OUTCOME="no_changes"
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"

      - name: Comment with pull request link
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.publication.outputs.pr_url }}
          BRANCH_NAME: publish/issue-${{ github.event.issue.number }}
          CPR_OUTCOME: ${{ steps.publication.outputs.outcome || 'no_changes' }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const marker = '<!-- terrapath-publication-status -->';
            const branchUrl = `${process.env.SERVER_URL}/${process.env.REPOSITORY}/tree/${process.env.BRANCH_NAME}`;
            const body = process.env.CPR_OUTCOME === 'failure'
              ? [
                  marker,
                  '',
                  'Publication branch was pushed, but GitHub Actions could not create the pull request automatically.',
                  '',
                  `Branch: ${branchUrl}`,
                  '',
                  'Most common fix:',
                  '1. Open `Settings -> Actions -> General` in the repository.',
                  '2. In `Workflow permissions`, enable `Allow GitHub Actions to create and approve pull requests`.',
                  '3. Add repository secret `BOT_PAT` (a token with pull request rights).',
                  '4. Re-run this workflow, or open a pull request manually from the branch above.'
                ].join('\n')
              : process.env.PR_URL
              ? [
                  marker,
                  '',
                  `Publication pull request created: ${process.env.PR_URL}`,
                  '',
                  'Next step:',
                  '1. Review the PR diff.',
                  '2. Merge it into `main`.',
                  '3. GitHub Pages will publish the updated catalog automatically.'
                ].join('\n')
              : [
                  marker,
                  '',
                  'No publication PR was created. This usually means the exported guide did not change the repository.'
                ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const existing = comments.filter((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing.length) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing[0].id,
                body
              });

              for (const duplicate of existing.slice(1)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: duplicate.id
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            }

      - name: Notice if GitHub blocked pull request creation
        if: steps.publication.outputs.outcome == 'failure'
        run: |
          echo "::warning::Automatic pull request creation failed."
          echo "::warning::Enable 'Allow GitHub Actions to create and approve pull requests' in Settings -> Actions -> General."
          echo "::warning::For org-level restrictions, add BOT_PAT repository secret with pull request rights."
          echo "::warning::If org policy blocks it, open a manual PR from branch publish/issue-${{ github.event.issue.number }}."
