name: Validate guides

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate guides
        run: python tools/validate_guides.py

      - name: Check generated Terraria support
        run: python tools/build_support_pack.py --mod Terraria --check

      - name: Validate support data
        run: python tools/validate_support_data.py

      - name: Check generated catalog
        run: python tools/build_catalog.py --check
