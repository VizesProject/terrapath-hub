<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="editor.title">Guide Builder - TerraPath</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script src="assets/site.js" defer></script>
    <script src="assets/progression.js" defer></script>
    <script src="assets/editor.js" defer></script>
  </head>
  <body>
    <nav class="nav nav--compact">
      <a class="brand" href="index.html">TerraPath</a>
      <div class="nav__links">
        <a data-i18n="common.navBrowse" href="browse.html">Browse</a>
        <a data-i18n="common.navBuilder" href="editor.html">Builder</a>
      </div>
      <div class="nav__tools" data-language-toggle></div>
    </nav>

    <main class="workspace">
      <section class="panel editor-panel">
        <header class="page-header">
          <h1 data-i18n="editor.heading">Guide Builder</h1>
          <p id="supportStatus" class="muted">Loading curated Terraria content...</p>
        </header>

        <ol id="wizardSteps" class="wizard-steps"></ol>

        <header class="step-header">
          <p id="stepEyebrow" class="muted">Step 1 of 3</p>
          <h2 id="stepTitle">Guide</h2>
          <p id="stepDescription" class="muted"></p>
        </header>

        <section class="wizard-panel" data-step-panel="0">
          <div class="form-layout">
            <label class="field">
              <span data-editor-text="guideTitleLabel">Guide title</span>
              <input id="titleInput" minlength="3" placeholder="Vanilla Melee Starter Path">
            </label>

            <label class="field">
              <span data-editor-text="authorLabel">Author</span>
              <input id="authorInput" minlength="2" placeholder="Your name">
            </label>

            <label class="field">
              <span data-editor-text="languageLabel">Language</span>
              <select id="languageSelect"></select>
            </label>

            <label class="field field--wide">
              <span data-editor-text="summaryLabel">Summary</span>
              <textarea id="summaryInput" rows="4" placeholder="Short description shown in the guide list."></textarea>
            </label>
          </div>

          <section class="form-section">
            <div class="section-heading">
              <h3 data-editor-text="requiredModsHeading">Required mods</h3>
            </div>
            <div id="requiredModOptions" class="choice-grid" aria-label="Required mods"></div>
          </section>

          <section class="form-section">
            <div class="section-heading">
              <h3 data-editor-text="classTagsHeading">Class tags</h3>
            </div>
            <div id="classTagOptions" class="choice-grid" aria-label="Class tags"></div>
          </section>
        </section>

        <section class="wizard-panel" data-step-panel="1" hidden>
          <div class="stage-toolbar">
            <button class="button button--primary" id="addStageButton" type="button" data-editor-text="addStage">Add stage</button>
          </div>
          <div id="stageAccordion" class="stage-accordion"></div>
        </section>

        <section class="wizard-panel" data-step-panel="2" hidden>
          <section class="review-card">
            <div class="toolbar">
              <button class="button" id="copyJsonButton" type="button" data-editor-text="copyJson">Copy JSON</button>
              <button class="button" id="downloadButton" type="button" data-editor-text="downloadJson">Download guide.json</button>
              <button class="button button--primary" id="openIssueButton" type="button" data-editor-text="openIssue">Open GitHub issue</button>
              <button class="button button--quiet" id="resetDraftButton" type="button" data-editor-text="resetDraft">Reset draft</button>
            </div>
            <p id="submissionStatus" class="muted" data-editor-text="submissionStatus">Drafts are saved locally.</p>
          </section>

          <section class="review-card">
            <h3 data-editor-text="previewHeading">Preview</h3>
            <div id="guidePreview" class="guide-preview"></div>
          </section>

          <section class="review-card">
            <h3>guide.json</h3>
            <pre id="jsonPreview" class="json-preview">{}</pre>
          </section>
        </section>

        <footer class="wizard-footer">
          <button class="button button--quiet" id="prevStepButton" type="button" data-editor-text="back">Back</button>
          <p id="autosaveStatus" class="muted" data-editor-text="autosave">Draft autosaves in this browser.</p>
          <button class="button button--primary" id="nextStepButton" type="button" data-editor-text="nextStep">Next step</button>
        </footer>
      </section>
    </main>
  </body>
</html>
