name: Guide submission
description: Submit one exported guide for publication.
title: "[Guide]: "
labels: ["guide-submission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Submit one exported `guide.json` per issue. TerraPath validates it automatically, and published guides are reviewed before they are added to the catalog.
  - type: textarea
    id: guide_json
    attributes:
      label: guide.json
      description: Paste the full JSON guide here exactly as exported by the editor.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Submission checklist
      options:
        - label: I validated the guide in the editor preview before submitting.
          required: true
        - label: I understand that the guide may be edited or rejected before publication.
          required: true
  - type: textarea
    id: notes
    attributes:
      label: Submission notes
      description: Mention required mods, tested progression, known gaps, balance assumptions, or anything important about this guide.
